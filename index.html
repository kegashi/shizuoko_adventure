<!doctype html>
<html lang="ja" class="portal-page">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>しずデジ 3on3</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="portal-body">
    <main class="portal-shell" aria-label="しずデジ 3on3">
      <header class="portal-hero">
        <div>
          <p class="portal-date">2026.6.20</p>
          <h1>しずデジ</h1>
          <p>3on3 ＠ヌマロコ</p>
        </div>
        <img src="./shizuoko_images/gkok001_01.png" alt="しずオコくん" />

      <section class="quick-links" aria-label="イベント情報">
        <a class="content-card quick-card" href="https://tonamel.com/competition/BOYHx/tournament">

          <span class="content-text">
            <span class="content-kicker">対戦表</span>
            <strong>トーナメント</strong>

        <a class="content-card quick-card" href="./profile.html">
          <span class="content-thumb">
            <img src="./shizuoko_images/gkok001_01.png" alt="" />

          <span class="content-text">
            <span class="content-kicker">参加者情報</span>
            <strong>プロフィール</strong>
          </span>
        </a>
      </section>

      <section class="content-links" aria-label="コンテンツ一覧">
        <a class="content-card" href="./tsume-digica.html">
          <span class="content-thumb">

            <span class="content-kicker">サイドイベント1</span>

        <a class="content-card" href="./game.html">
          <span class="content-thumb">
            <img src="./assets/menu/super-shizuoko-thumb.jpg" alt="" />

          <span class="content-text">
            <span class="content-kicker">サイドイベント2</span>
            <strong>スーパーしずオコ</strong>
            <span>2Dアクションゲーム！</span>
          </span>
        </a>
        <a class="content-card score-card" href="./score-sheet.html">
          <span class="content-thumb">
            <img src="./assets/menu/score-sheet-thumb.jpg" alt="" />
          </span>
          <span class="content-text">
            <span class="content-kicker">達成状況</span>
            <strong>スコアシート</strong>
            <span>クリア条件を確認！</span>
          </span>
